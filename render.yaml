services:
  # ─── Backend (FastAPI) ─────────────────────────────────────────────────────
  - type: web
    name: hackathon-radar-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"

  # ─── Frontend (Next.js) ────────────────────────────────────────────────────
  - type: web
    name: hackathon-radar-frontend
    runtime: node
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NEXT_PUBLIC_API_URL
        # 👇 Update this to your actual backend service URL after first deploy
        value: "https://hackathon-radar-api.onrender.com"
